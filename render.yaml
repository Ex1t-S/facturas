services:
  - type: web
    name: fmh-gestion
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_RATE_LIMIT_MAX
        value: "300"
      - key: TRUST_PROXY
        value: "true"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: ENGINEERING_SOURCE_STORAGE_ROOT
        value: ./uploads/engineering-sources
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_ENGINEERING_MODEL
        value: gpt-5.6-sol
      - key: ENGINEERING_DRAWINGS_ROOT
        sync: false
      - key: OPENAI_ENGINEERING_FAST_MODEL
        sync: false
      - key: OPENAI_ENGINEERING_REASONING_EFFORT
        value: high
      - key: OPENAI_ENGINEERING_WEB_SEARCH_ENABLED
        value: "false"
      - key: MAX_ENGINEERING_TOOL_ROUNDS
        value: "8"
      - key: OPENAI_ENGINEERING_MAX_OUTPUT_TOKENS
        value: "2200"
      - key: ENGINEERING_PROMPT_VERSION
        value: engineering-v2
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_VECTOR_STORE_ID
        sync: false
      - key: BASIC_AUTH_USERNAME
        sync: false
      - key: BASIC_AUTH_PASSWORD
        sync: false
      - key: WHATSAPP_ALLOWED_FROM
        sync: false
      - key: WHATSAPP_TEST_MODE
        value: "false"
      - key: SUPPLIER_PUBLIC_SYNC_ENABLED
        value: "true"
      - key: SUPPLIER_PUBLIC_SYNC_INTERVAL_HOURS
        value: "4"
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: ARCA_ENVIRONMENT
        value: homologacion
      - key: ARCA_CUIT
        sync: false
      - key: ARCA_CERT_PATH
        sync: false
      - key: ARCA_KEY_PATH
        sync: false
      - key: ARCA_POINT_OF_SALE
        sync: false
